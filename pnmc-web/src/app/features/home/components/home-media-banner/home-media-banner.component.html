<div class="relative w-full h-full">
  @for (s of slides; track $index) {
    @let isActive = $index === activeIndex();
    
    <div
      [attr.aria-hidden]="!isActive"
      class="absolute inset-0 transition-all duration-1000"
      [class.opacity-100]="isActive"
      [class.pointer-events-auto]="isActive"
      [class.z-10]="isActive"
      [class.opacity-0]="!isActive"
      [class.pointer-events-none]="!isActive"
      [class.z-0]="!isActive"
    >
      <img [src]="s.url" [alt]="s.title" class="w-full h-full object-cover brightness-[0.5] saturate-[0.7]" />
      <div class="absolute inset-0 bg-[#291242]/58"></div>
      <div class="absolute inset-0 bg-gradient-to-b from-[#291242]/92 via-[#291242]/20 to-[#291242]/92"></div>
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_70%_45%,rgba(139,247,132,0.12),transparent_35%)]"></div>
      <div class="absolute inset-0 max-w-[100rem] mx-auto px-6 lg:px-12 py-6 sm:py-8 md:py-10 flex items-end justify-end">
        <div class="max-w-lg pb-6 sm:pb-10 md:pb-14 text-right flex flex-col items-end">
          <span class="inline-flex rounded-full border border-white/10 bg-white/10 px-3 py-1.5 font-alternate text-[0.55rem] font-bold uppercase tracking-[0.28em] text-[#8BF784]">
            {{ s.tag }}
          </span>
          <span class="mt-4 md:mt-6 block font-alternate text-[0.55rem] font-bold uppercase tracking-[0.3em] text-white/45">
            0{{ $index + 1 }} / 03
          </span>
          <h3 class="mt-2 md:mt-3 max-w-xl font-gregor text-2xl sm:text-3xl md:text-4xl text-white font-bold uppercase leading-none tracking-tight">
            {{ s.title }}
          </h3>
          <p class="mt-3 md:mt-4 max-w-md font-nunito text-[0.74rem] md:text-[0.82rem] text-white/70 leading-relaxed">
            {{ s.desc }}
          </p>
          <div class="mt-4 md:mt-6">
            <button
              type="button"
              (click)="onAction(s.actionId)"
              class="px-6 py-2.5 sm:px-7 sm:py-3 text-[0.66rem] inline-flex items-center gap-2 rounded-xl font-bold uppercase tracking-widest bg-[#00DA5E] text-[#291242] hover:bg-[#8BF784] transition-all cursor-pointer border-0"
            >
              {{ s.cta }}
              <svg lucideArrowRight [size]="14"></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  }

  <div class="absolute bottom-8 right-6 lg:right-12 z-20 flex justify-end gap-2.5">
    @for (s of slides; track $index) {
      <button
        type="button"
        (click)="selectSlide($index)"
        class="w-14 h-0.5 bg-white/15 rounded-full overflow-hidden border-0 cursor-pointer p-0"
        [attr.aria-label]="'Ir al banner ' + ($index + 1)"
      >
        <div 
          class="h-full bg-[#8BF784]" 
          [style.width.%]="$index === activeIndex() ? progress() : $index < activeIndex() ? 100 : 0"
        ></div>
      </button>
    }
  </div>
</div>
